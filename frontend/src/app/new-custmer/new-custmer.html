<div class="container">
    
    <h1 class="mt-4">New Customer</h1>
    <form [formGroup]="newCustmerFormGroup" (ngSubmit)="handleSaveCustomer()" class="mt-4">
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" formControlName="name" id="name" placeholder="Enter name">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="email" id="email" placeholder="Enter email">
        </div>
        <button [disabled]="newCustmerFormGroup.invalid" type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>
